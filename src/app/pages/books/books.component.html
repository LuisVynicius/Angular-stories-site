<div class="container">

    <app-rectangle-background
        width="1100px"
        height="fit-content"
        display="flex"
        flexDirection="row"
        gap="6px"
        flexWrap="wrap"
        justifyContent="center"
    >

        <app-book *ngFor="let x of [1,2,3,4,5,6,7, 8]"
            bookName="Nome do Livro {{x}}"
            author="Mevy"
            quantity="90"
            updateDate="20/12/2024 14:36"
            [categories]="['Ação', 'Aventura', 'Comédia', 'Slice of life',]"
            description="Descrição muito daora"
        ></app-book>

    </app-rectangle-background>
    
</div>
